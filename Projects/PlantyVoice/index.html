<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>🌱 Planty</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #e8e8e8;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #7ec8e3;
        }

        .subtitle {
            font-size: 1rem;
            color: #888;
            margin-bottom: 40px;
        }

        .talk-button {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, #3a7bd5, #00d2ff);
            color: white;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 40px rgba(0, 210, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
        }

        .talk-button:active {
            transform: scale(0.95);
        }

        .talk-button.listening {
            background: linear-gradient(145deg, #e74c3c, #c0392b);
            animation: pulse 1.5s infinite;
            box-shadow: 0 10px 40px rgba(231, 76, 60, 0.4);
        }

        .talk-button.thinking {
            background: linear-gradient(145deg, #f39c12, #e67e22);
            animation: pulse 0.8s infinite;
            box-shadow: 0 10px 40px rgba(243, 156, 18, 0.4);
        }

        .talk-button.speaking {
            background: linear-gradient(145deg, #27ae60, #2ecc71);
            animation: pulse 1s infinite;
            box-shadow: 0 10px 40px rgba(46, 204, 113, 0.4);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .status {
            font-size: 1.1rem;
            color: #aaa;
            min-height: 30px;
            margin-bottom: 20px;
        }

        .transcript {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            min-height: 100px;
            max-height: 200px;
            overflow-y: auto;
            text-align: left;
            font-size: 1rem;
            line-height: 1.5;
        }

        .transcript .user {
            color: #7ec8e3;
            margin-bottom: 10px;
        }

        .transcript .planty {
            color: #2ecc71;
        }

        .clear-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: transparent;
            border: 1px solid #555;
            color: #888;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .clear-btn:hover {
            border-color: #888;
            color: #aaa;
        }

        .error {
            color: #e74c3c;
            margin-top: 10px;
        }

        /* iOS Safari notch handling */
        @supports (padding-top: env(safe-area-inset-top)) {
            body {
                padding-top: env(safe-area-inset-top);
                padding-bottom: env(safe-area-inset-bottom);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌱 Planty</h1>
        <p class="subtitle">Tap and talk</p>

        <button class="talk-button" id="talkBtn">
            Hold to Talk
        </button>

        <p class="status" id="status">Ready</p>

        <div class="transcript" id="transcript">
            <p style="color: #666; font-style: italic;">Conversation will appear here...</p>
        </div>

        <button class="clear-btn" id="clearBtn">Clear Chat</button>

        <p class="error" id="error"></p>
    </div>

    <script>
        const talkBtn = document.getElementById('talkBtn');
        const status = document.getElementById('status');
        const transcript = document.getElementById('transcript');
        const errorEl = document.getElementById('error');
        const clearBtn = document.getElementById('clearBtn');

        // Speech recognition setup
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let isListening = false;
        let finalTranscript = '';

        // Speech synthesis
        const synth = window.speechSynthesis;

        // Check browser support
        if (!SpeechRecognition) {
            errorEl.textContent = 'Speech recognition not supported in this browser';
            talkBtn.disabled = true;
        } else {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onresult = (event) => {
                let interim = '';
                finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const result = event.results[i];
                    if (result.isFinal) {
                        finalTranscript += result[0].transcript;
                    } else {
                        interim += result[0].transcript;
                    }
                }

                status.textContent = finalTranscript || interim || 'Listening...';
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                if (event.error !== 'no-speech') {
                    errorEl.textContent = `Error: ${event.error}`;
                }
                stopListening();
            };

            recognition.onend = () => {
                if (isListening) {
                    // Unexpected end, restart
                    recognition.start();
                }
            };
        }

        // Hold to talk
        let holdTimer = null;

        talkBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startListening();
        });

        talkBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            stopListening();
        });

        // Mouse fallback for testing on desktop
        talkBtn.addEventListener('mousedown', startListening);
        talkBtn.addEventListener('mouseup', stopListening);
        talkBtn.addEventListener('mouseleave', () => {
            if (isListening) stopListening();
        });

        function startListening() {
            if (!recognition) return;

            // Cancel any ongoing speech
            synth.cancel();

            errorEl.textContent = '';
            finalTranscript = '';
            isListening = true;

            talkBtn.classList.add('listening');
            talkBtn.classList.remove('thinking', 'speaking');
            talkBtn.textContent = 'Listening...';
            status.textContent = 'Listening...';

            try {
                recognition.start();
            } catch (e) {
                // Already started
            }
        }

        function stopListening() {
            if (!recognition || !isListening) return;

            isListening = false;
            recognition.stop();

            talkBtn.classList.remove('listening');
            talkBtn.textContent = 'Hold to Talk';

            const userMessage = finalTranscript.trim();
            if (userMessage) {
                sendMessage(userMessage);
            } else {
                status.textContent = 'Ready';
            }
        }

        async function sendMessage(message) {
            talkBtn.classList.add('thinking');
            talkBtn.textContent = 'Thinking...';
            status.textContent = 'Arcturus is thinking...';

            // Show user message
            addToTranscript('user', message);

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || 'Server error');
                }

                const data = await response.json();
                const reply = data.response;

                // Show and speak response
                addToTranscript('planty', reply);
                speak(reply);

            } catch (e) {
                errorEl.textContent = e.message;
                talkBtn.classList.remove('thinking');
                talkBtn.textContent = 'Hold to Talk';
                status.textContent = 'Ready';
            }
        }

        function speak(text) {
            talkBtn.classList.remove('thinking');
            talkBtn.classList.add('speaking');
            talkBtn.textContent = 'Speaking...';
            status.textContent = 'Planty is speaking...';

            // Clean up text for speech (remove markdown, emojis, etc)
            let cleanText = text
                .replace(/[*_~`#]/g, '')
                .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
                .replace(/:\w+:/g, '');

            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.rate = 0.95;
            utterance.pitch = 1.0;

            // Try to get a nice voice
            const voices = synth.getVoices();
            const preferred = voices.find(v =>
                v.name.includes('Samantha') ||
                v.name.includes('Karen') ||
                v.name.includes('Daniel') ||
                v.lang.startsWith('en')
            );
            if (preferred) utterance.voice = preferred;

            utterance.onend = () => {
                talkBtn.classList.remove('speaking');
                talkBtn.textContent = 'Hold to Talk';
                status.textContent = 'Ready';
            };

            utterance.onerror = (e) => {
                console.error('Speech synthesis error:', e);
                talkBtn.classList.remove('speaking');
                talkBtn.textContent = 'Hold to Talk';
                status.textContent = 'Ready';
            };

            synth.speak(utterance);
        }

        function addToTranscript(role, text) {
            // Clear placeholder on first message
            if (transcript.querySelector('p[style]')) {
                transcript.innerHTML = '';
            }

            const p = document.createElement('p');
            p.className = role;
            p.textContent = (role === 'user' ? 'You: ' : '🌱 ') + text;
            transcript.appendChild(p);
            transcript.scrollTop = transcript.scrollHeight;
        }

        clearBtn.addEventListener('click', async () => {
            transcript.innerHTML = '<p style="color: #666; font-style: italic;">Conversation will appear here...</p>';
            try {
                await fetch('/clear', { method: 'POST' });
            } catch (e) {}
        });

        // Load voices (needed for some browsers)
        if (synth.onvoiceschanged !== undefined) {
            synth.onvoiceschanged = () => synth.getVoices();
        }
    </script>
</body>
</html>
