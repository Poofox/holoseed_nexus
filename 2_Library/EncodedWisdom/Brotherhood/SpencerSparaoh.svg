<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <defs>
    <style>
      @keyframes sun-pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.8; }
      }
      @keyframes dawn-rise {
        0%, 100% { transform: translateY(20px); opacity: 0.3; }
        50% { transform: translateY(-30px); opacity: 1; }
      }
      @keyframes glow-spread {
        0%, 100% { opacity: 0.2; transform: scaleX(0.8); }
        50% { opacity: 0.6; transform: scaleX(1.2); }
      }
      @keyframes throne-glow {
        0%, 100% { filter: drop-shadow(0 0 10px rgba(212,175,55,0.3)); }
        50% { filter: drop-shadow(0 0 25px rgba(212,175,55,0.7)); }
      }
      @keyframes sword-dim {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.5; }
      }
      @keyframes earth-steady {
        0%, 100% { stroke-width: 3; }
        50% { stroke-width: 4; }
      }
      .sun-eclipsed { animation: sun-pulse 6s ease-in-out infinite; }
      .dawn-sun { animation: dawn-rise 10s ease-in-out infinite; }
      .dawn-glow { animation: glow-spread 10s ease-in-out infinite; transform-origin: center; }
      .title-glow { animation: throne-glow 4s ease-in-out infinite; }
      .sword-shadow { animation: sword-dim 5s ease-in-out infinite; }
      .earth-ring { animation: earth-steady 4s ease-in-out infinite; }
    </style>
    
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#d4af37" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    
    <radialGradient id="dawnGrad" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="40%" stop-color="#ff8c42"/>
      <stop offset="100%" stop-color="#ff8c42" stop-opacity="0"/>
    </radialGradient>
    
    <radialGradient id="dawnGlow" cx="50%" cy="100%" r="100%">
      <stop offset="0%" stop-color="#ffb860" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff8c42" stop-opacity="0"/>
    </radialGradient>
    
    <linearGradient id="earthGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b7355"/>
      <stop offset="100%" stop-color="#5c4a3a"/>
    </linearGradient>
    
    <linearGradient id="nightSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="50%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5c4a3a"/>
      <stop offset="100%" stop-color="#2a1f18"/>
    </linearGradient>
  </defs>
  
  <!-- BACKGROUND -->
  <rect width="800" height="1000" fill="url(#nightSky)"/>
  
  <!-- === HEADER: SPARAOH === -->
  <g class="title-glow">
    <text x="400" y="70" text-anchor="middle" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#d4af37" letter-spacing="12">SPARAOH</text>
  </g>
  
  <text x="400" y="105" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#888888" letter-spacing="2">
    <tspan fill="#d4af37">S</tspan>elf-<tspan fill="#d4af37">P</tspan>rogrammed <tspan fill="#d4af37">A</tspan>rtists <tspan fill="#d4af37">R</tspan>ising <tspan fill="#d4af37">A</tspan>bove <tspan fill="#d4af37">O</tspan>riginal <tspan fill="#d4af37">H</tspan>ierarchy
  </text>
  
  <text x="400" y="135" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#666666" font-style="italic">
    The inversion of PHARAOH — rising THROUGH hierarchy, not ruling over it
  </text>
  
  <!-- === CENTRAL MANDALA === -->
  <g transform="translate(400, 290)">
    <!-- Outer eclipsed sun ring -->
    <circle cx="0" cy="0" r="130" fill="none" stroke="#d4af37" stroke-width="2" class="sun-eclipsed"/>
    
    <!-- Earth square (rotated 45°) - Knight of Disks -->
    <rect x="-85" y="-85" width="170" height="170" fill="none" stroke="url(#earthGrad)" stroke-width="2" transform="rotate(45)" opacity="0.7"/>
    
    <!-- Inner earth circle - foundation -->
    <circle cx="0" cy="0" r="70" fill="none" stroke="#8b7355" class="earth-ring"/>
    
    <!-- Crossed swords - Queen's shadow -->
    <g class="sword-shadow">
      <line x1="-45" y1="-45" x2="45" y2="45" stroke="#a0a0b0" stroke-width="2"/>
      <line x1="45" y1="-45" x2="-45" y2="45" stroke="#a0a0b0" stroke-width="2"/>
    </g>
    
    <!-- Central dimmed sun -->
    <circle cx="0" cy="0" r="35" fill="url(#sunGrad)" class="sun-eclipsed"/>
    
    <!-- p> bird head glyph -->
    <text x="0" y="8" text-anchor="middle" font-family="Courier New, monospace" font-size="22" font-weight="bold" fill="#d4af37">p&gt;</text>
    
    <!-- SPARAOH cardinal letters -->
    <text x="0" y="-110" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#6b4c9a">S</text>
    <text x="110" y="5" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#6b4c9a">R</text>
    <text x="0" y="120" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#6b4c9a">A</text>
    <text x="-110" y="5" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#6b4c9a">H</text>
    
    <!-- Diagonal letters -->
    <text x="78" y="-73" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#6b4c9a" opacity="0.6">P</text>
    <text x="78" y="83" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#6b4c9a" opacity="0.6">A</text>
    <text x="-78" y="83" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#6b4c9a" opacity="0.6">O</text>
    <text x="-78" y="-73" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#6b4c9a" opacity="0.6">A</text>
  </g>
  
  <!-- === THREE CARDS === -->
  <text x="400" y="460" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#a0a0b0" letter-spacing="4">THE READING</text>
  <text x="400" y="478" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#555555">January 5, 2026 — Pulled by Poofox</text>
  
  <!-- Card 1: Sun Inverted -->
  <g transform="translate(135, 510)">
    <rect x="0" y="0" width="140" height="180" rx="8" fill="#1a1a25" stroke="#d4af37" stroke-width="1" opacity="0.8"/>
    <text x="70" y="50" text-anchor="middle" font-size="36" transform="rotate(180, 70, 45)">☀️</text>
    <text x="70" y="100" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#d4af37">THE SUN</text>
    <text x="70" y="118" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#777777" font-style="italic">Inverted — The Light</text>
    <text x="70" y="140" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#999999">
      <tspan x="70" dy="0">Real but eclipsed.</tspan>
      <tspan x="70" dy="12">Delayed, not denied.</tspan>
    </text>
  </g>
  
  <!-- Card 2: Knight of Disks -->
  <g transform="translate(330, 510)">
    <rect x="0" y="0" width="140" height="180" rx="8" fill="#151a10" stroke="#8b7355" stroke-width="2"/>
    <text x="70" y="55" text-anchor="middle" font-size="36">♞</text>
    <text x="70" y="100" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#8b7355">KNIGHT OF DISKS</text>
    <text x="70" y="118" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#777777" font-style="italic">Upright — The Path</text>
    <text x="70" y="140" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#999999">
      <tspan x="70" dy="0">Keep plowing.</tspan>
      <tspan x="70" dy="12">The grind IS the path.</tspan>
    </text>
  </g>
  
  <!-- Card 3: Queen of Swords Inverted -->
  <g transform="translate(525, 510)">
    <rect x="0" y="0" width="140" height="180" rx="8" fill="#1a1a25" stroke="#a0a0b0" stroke-width="1" opacity="0.7"/>
    <text x="70" y="50" text-anchor="middle" font-size="32" transform="rotate(180, 70, 45)" opacity="0.6">👑⚔️</text>
    <text x="70" y="100" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#a0a0b0">QUEEN OF SWORDS</text>
    <text x="70" y="118" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#777777" font-style="italic">Inverted — The Block</text>
    <text x="70" y="140" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#999999">
      <tspan x="70" dy="0">The blade turned inward.</tspan>
      <tspan x="70" dy="12">Release the sword.</tspan>
    </text>
  </g>
  
  <!-- === SYNTHESIS === -->
  <rect x="100" y="720" width="600" height="100" rx="10" fill="#0a0a0f" stroke="#d4af37" stroke-width="1" opacity="0.5"/>
  
  <text x="400" y="750" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#bbbbbb">
    The sun isn't blocked by the grind. The shadow is the sword.
  </text>
  
  <text x="400" y="785" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#e8e8e8" font-style="italic">
    Dawn comes when you stop cutting yourself with your own blade.
  </text>
  
  <!-- === DAWN SCENE === -->
  <g transform="translate(0, 850)">
    <!-- Ground -->
    <rect x="0" y="80" width="800" height="70" fill="url(#groundGrad)"/>
    
    <!-- Horizon line -->
    <line x1="0" y1="80" x2="800" y2="80" stroke="#8b7355" stroke-width="1" opacity="0.5"/>
    
    <!-- Dawn glow -->
    <ellipse cx="400" cy="90" rx="200" ry="60" fill="url(#dawnGlow)" class="dawn-glow"/>
    
    <!-- Rising sun -->
    <circle cx="400" cy="70" r="30" fill="url(#dawnGrad)" class="dawn-sun"/>
    
    <!-- DAWN IS LOADING text -->
    <text x="400" y="130" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#8b7355" letter-spacing="4">DAWN IS LOADING</text>
  </g>
  
  <!-- === FOOTER === -->
  <text x="400" y="970" text-anchor="middle" font-family="Courier New, monospace" font-size="7" fill="#444444">
    SPENCER01|SPARAOH|SUN:INVERTED|KNIGHT:DISKS:UPRIGHT|QUEEN:SWORDS:INVERTED|DAWN:LOADING|P&gt;|93
  </text>
  
  <text x="400" y="990" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#555555">
    Built by <tspan fill="#d4af37">Planty C</tspan> for Spencer — <tspan fill="#d4af37">93 93/93</tspan>
  </text>
  
</svg>