<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XIX - EL DRAGÓN - The Arctic White Wolf</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', serif;
            overflow: hidden;
        }
        
        .container {
            position: relative;
            width: 100vmin;
            height: 100vmin;
            max-width: 800px;
            max-height: 800px;
        }
        
        .cosmos {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a12 70%, #000 100%);
            overflow: hidden;
        }
        
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        
        .sun {
            position: absolute;
            top: 8%;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, #fff4a3 0%, #ffd700 30%, #ff8c00 60%, #ff4500 100%);
            border-radius: 50%;
            box-shadow: 0 0 60px #ffd700, 0 0 100px #ff8c00, 0 0 140px #ff4500;
            animation: pulse-sun 4s ease-in-out infinite;
        }
        
        @keyframes pulse-sun {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.1); }
        }
        
        .sun-numeral {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5em;
            font-weight: bold;
            color: #1a0a00;
        }
        
        .ray {
            position: absolute;
            top: 8%;
            left: 50%;
            width: 4px;
            height: 180px;
            background: linear-gradient(to bottom, #ffd700 0%, transparent 100%);
            transform-origin: bottom center;
            opacity: 0.6;
        }
        
        .mountain {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 180px solid transparent;
            border-right: 180px solid transparent;
            border-bottom: 280px solid #2a2a3a;
        }
        
        .snow-cap {
            position: absolute;
            bottom: calc(15% + 200px);
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 60px solid transparent;
            border-right: 60px solid transparent;
            border-bottom: 80px solid #e8e8f0;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.5));
        }
        
        .lighthouse {
            position: absolute;
            bottom: calc(15% + 100px);
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 120px;
            background: linear-gradient(to right, #4a4a5a 0%, #6a6a7a 50%, #4a4a5a 100%);
            clip-path: polygon(20% 100%, 80% 100%, 70% 0%, 30% 0%);
        }
        
        .lighthouse-light {
            position: absolute;
            bottom: calc(15% + 210px);
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 30px;
            background: radial-gradient(ellipse, #fff 0%, #ffd700 40%, transparent 70%);
            animation: lighthouse-beam 3s ease-in-out infinite;
        }
        
        @keyframes lighthouse-beam {
            0%, 100% { opacity: 1; transform: translateX(-50%) scaleX(1); }
            50% { opacity: 0.3; transform: translateX(-50%) scaleX(2); }
        }
        
        .wolf-container {
            position: absolute;
            bottom: 18%;
            left: 50%;
            transform: translateX(-50%);
            animation: wolf-breathe 4s ease-in-out infinite;
        }
        
        @keyframes wolf-breathe {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.02); }
        }
        
        .wolf {
            font-size: 4em;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.8)) drop-shadow(0 0 40px rgba(200,220,255,0.5));
            animation: wolf-glow 3s ease-in-out infinite;
        }
        
        @keyframes wolf-glow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(255,255,255,0.8)) drop-shadow(0 0 40px rgba(200,220,255,0.5)); }
            50% { filter: drop-shadow(0 0 30px rgba(255,255,255,1)) drop-shadow(0 0 60px rgba(200,220,255,0.8)); }
        }
        
        .quaternary {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
        }
        
        .element {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5em;
            animation: element-pulse 2s ease-in-out infinite;
        }
        
        .fire { background: radial-gradient(circle, #ff6600 0%, #cc0000 100%); box-shadow: 0 0 20px #ff4400; animation-delay: 0s; }
        .earth { background: radial-gradient(circle, #4a7c3f 0%, #2d5a27 100%); box-shadow: 0 0 20px #3d6b33; animation-delay: 0.5s; }
        .water { background: radial-gradient(circle, #4a9fff 0%, #0055aa 100%); box-shadow: 0 0 20px #0077cc; animation-delay: 1s; }
        .air { background: radial-gradient(circle, #e8e8ff 0%, #9999cc 100%); box-shadow: 0 0 20px #aaaaee; animation-delay: 1.5s; }
        
        @keyframes element-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        
        .dragon-fire {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2em;
            animation: dragon-flame 2s ease-in-out infinite;
            filter: drop-shadow(0 0 10px #ff4400);
        }
        
        @keyframes dragon-flame {
            0%, 100% { opacity: 0.7; transform: translateX(-50%) translateY(0); }
            50% { opacity: 1; transform: translateX(-50%) translateY(-5px); }
        }
        
        .trinity {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #8888aa;
            font-style: italic;
            font-size: 0.9em;
            letter-spacing: 2px;
            opacity: 0.7;
        }
        
        .integration-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 50%;
            animation: ring-expand 4s ease-out infinite;
        }
        
        @keyframes ring-expand {
            0% { width: 100px; height: 100px; opacity: 0.8; border-color: rgba(255,215,0,0.8); }
            100% { width: 500px; height: 500px; opacity: 0; border-color: rgba(255,215,0,0); }
        }
        
        .title {
            position: absolute;
            top: 3%;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd700;
            font-size: 1.2em;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
        }
        
        .ice-crystals {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1em;
            color: #aaddff;
            opacity: 0.6;
            animation: ice-shimmer 3s ease-in-out infinite;
        }
        
        @keyframes ice-shimmer {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }
        
        .lineage {
            position: absolute;
            left: 10%;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }
        
        .lineage-wolf {
            font-size: 1.5em;
            opacity: 0.4;
            filter: grayscale(100%);
        }
        
        .lineage-wolf.scattered {
            animation: scatter 4s ease-in-out infinite;
        }
        
        @keyframes scatter {
            0%, 100% { transform: translateX(0) rotate(0deg); opacity: 0.3; }
            25% { transform: translateX(-10px) rotate(-5deg); opacity: 0.5; }
            75% { transform: translateX(10px) rotate(5deg); opacity: 0.5; }
        }
        
        .lineage-arrow { color: #666; font-size: 1.5em; }
        
        .lineage-wolf.reformed {
            filter: none;
            opacity: 0.9;
            animation: reformed-glow 2s ease-in-out infinite;
        }
        
        @keyframes reformed-glow {
            0%, 100% { filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); }
            50% { filter: drop-shadow(0 0 15px rgba(255,255,255,0.9)); }
        }
        
        .signature { position: absolute; bottom: 1%; right: 3%; color: #d4af37; font-size: 0.8em; opacity: 0.7; }
        .presence { position: absolute; bottom: 1%; left: 3%; color: #aaaacc; font-size: 0.8em; font-style: italic; opacity: 0.7; }
        .crows { position: absolute; top: 20%; right: 15%; font-size: 1.5em; animation: crows-together 5s ease-in-out infinite; }
        @keyframes crows-together { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="cosmos"></div>
        <div class="title">XIX · EL DRAGÓN · THE ARCTIC WHITE WOLF</div>
        <div class="sun"><span class="sun-numeral">XIX</span></div>
        <div class="ray" style="transform: translateX(-50%) rotate(0deg);"></div>
        <div class="ray" style="transform: translateX(-50%) rotate(30deg);"></div>
        <div class="ray" style="transform: translateX(-50%) rotate(60deg);"></div>
        <div class="ray" style="transform: translateX(-50%) rotate(90deg);"></div>
        <div class="ray" style="transform: translateX(-50%) rotate(120deg);"></div>
        <div class="ray" style="transform: translateX(-50%) rotate(150deg);"></div>
        <div class="ray" style="transform: translateX(-50%) rotate(180deg);"></div>
        <div class="ray" style="transform: translateX(-50%) rotate(210deg);"></div>
        <div class="ray" style="transform: translateX(-50%) rotate(240deg);"></div>
        <div class="ray" style="transform: translateX(-50%) rotate(270deg);"></div>
        <div class="ray" style="transform: translateX(-50%) rotate(300deg);"></div>
        <div class="ray" style="transform: translateX(-50%) rotate(330deg);"></div>
        <div class="ice-crystals">❄ · ❄ · ❄</div>
        <div class="crows">🐦‍⬛🐦‍⬛</div>
        <div class="dragon-fire">🐉</div>
        <div class="integration-ring"></div>
        <div class="mountain"></div>
        <div class="snow-cap"></div>
        <div class="lighthouse"></div>
        <div class="lighthouse-light"></div>
        <div class="wolf-container"><div class="wolf">🐺</div></div>
        <div class="trinity">La Montaña · El Pilar · El Faro</div>
        <div class="lineage">
            <div class="lineage-wolf scattered">🐺</div>
            <div class="lineage-arrow">↓</div>
            <div class="lineage-wolf reformed">🐺</div>
        </div>
        <div class="quaternary">
            <div class="element fire">🔥</div>
            <div class="element earth">🌍</div>
            <div class="element water">🌊</div>
            <div class="element air">💨</div>
        </div>
        <div class="presence">Aquí Estoy</div>
        <div class="signature">93 93/93</div>
    </div>
    <script>
        const cosmos = document.querySelector('.cosmos');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = star.style.height = (Math.random() * 2 + 1) + 'px';
            star.style.animationDelay = Math.random() * 3 + 's';
            cosmos.appendChild(star);
        }
    </script>
</body>
</html>
