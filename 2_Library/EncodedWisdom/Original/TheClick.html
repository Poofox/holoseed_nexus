<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Click - Holoseed Sketch v1</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0d0d1a 100%);
            font-family: 'Georgia', serif;
            color: #e8e8e8;
            overflow: hidden;
        }
        
        .container {
            position: relative;
            width: 500px;
            height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* The metronome arc / ripple rings */
        .ring {
            position: absolute;
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-radius: 50%;
            animation: pulse 4s ease-in-out infinite;
        }
        
        .ring:nth-child(1) { width: 100px; height: 100px; animation-delay: 0s; }
        .ring:nth-child(2) { width: 180px; height: 180px; animation-delay: 0.5s; }
        .ring:nth-child(3) { width: 260px; height: 260px; animation-delay: 1s; }
        .ring:nth-child(4) { width: 340px; height: 340px; animation-delay: 1.5s; }
        .ring:nth-child(5) { width: 420px; height: 420px; animation-delay: 2s; }
        
        @keyframes pulse {
            0%, 100% { 
                opacity: 0.3; 
                transform: scale(1);
                border-color: rgba(212, 175, 55, 0.3);
            }
            50% { 
                opacity: 1; 
                transform: scale(1.02);
                border-color: rgba(212, 175, 55, 0.8);
            }
        }
        
        /* The click point - center */
        .click-point {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #d4af37;
            border-radius: 50%;
            box-shadow: 0 0 30px #d4af37, 0 0 60px rgba(212, 175, 55, 0.5);
            animation: click-pulse 1s ease-in-out infinite;
            z-index: 10;
        }
        
        @keyframes click-pulse {
            0%, 100% { 
                transform: scale(1);
                box-shadow: 0 0 30px #d4af37, 0 0 60px rgba(212, 175, 55, 0.5);
            }
            50% { 
                transform: scale(1.3);
                box-shadow: 0 0 50px #d4af37, 0 0 100px rgba(212, 175, 55, 0.8);
            }
        }
        
        /* Pendulum / metronome arm */
        .pendulum {
            position: absolute;
            width: 4px;
            height: 150px;
            background: linear-gradient(to bottom, transparent, #d4af37);
            transform-origin: center bottom;
            animation: swing 2s ease-in-out infinite;
            bottom: 50%;
        }
        
        @keyframes swing {
            0%, 100% { transform: rotate(-30deg); }
            50% { transform: rotate(30deg); }
        }
        
        .pendulum-weight {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 16px;
            background: #d4af37;
            border-radius: 50%;
        }
        
        /* Text layers */
        .title {
            position: absolute;
            top: 30px;
            font-size: 2.5rem;
            letter-spacing: 0.5em;
            color: #d4af37;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }
        
        .axiom {
            position: absolute;
            bottom: 80px;
            font-size: 1rem;
            font-style: italic;
            color: rgba(232, 232, 232, 0.7);
            text-align: center;
            max-width: 400px;
            line-height: 1.6;
        }
        
        .stages {
            position: absolute;
            bottom: 20px;
            display: flex;
            gap: 40px;
            font-size: 0.8rem;
            color: rgba(212, 175, 55, 0.6);
        }
        
        .stages span {
            position: relative;
        }
        
        .stages span::before {
            content: '●';
            margin-right: 8px;
        }
        
        /* Beat markers around the circle */
        .beat-marker {
            position: absolute;
            width: 8px;
            height: 8px;
            background: rgba(212, 175, 55, 0.4);
            border-radius: 50%;
        }
        
        .beat-marker.downbeat {
            background: #d4af37;
            width: 12px;
            height: 12px;
        }
    </style>
</head>
<body>
    <div class="title">THE CLICK</div>
    
    <div class="container">
        <!-- Ripple rings -->
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        
        <!-- Metronome pendulum -->
        <div class="pendulum">
            <div class="pendulum-weight"></div>
        </div>
        
        <!-- Center click point -->
        <div class="click-point"></div>
        
        <!-- Beat markers at cardinal points -->
        <div class="beat-marker downbeat" style="top: 40px; left: 50%; transform: translateX(-50%);"></div>
        <div class="beat-marker" style="top: 50%; right: 40px; transform: translateY(-50%);"></div>
        <div class="beat-marker" style="bottom: 40px; left: 50%; transform: translateX(-50%);"></div>
        <div class="beat-marker" style="top: 50%; left: 40px; transform: translateY(-50%);"></div>
    </div>
    
    <div class="axiom">
        "Train against it until you internalize it.<br>
        Then you ARE in time.<br>
        The teacher becomes unnecessary."
    </div>
    
    <div class="stages">
        <span>EXTERNAL</span>
        <span>INTERNAL</span>
        <span>EMBODIED</span>
    </div>
</body>
</html>
