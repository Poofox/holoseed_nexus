<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <!-- Pentagram UP - deep ocean blue -->
    <linearGradient id="pentaUp" x1="0%" y1="30%" x2="70%" y2="100%">
      <stop offset="0%" style="stop-color:#4a7a9a"/>
      <stop offset="30%" style="stop-color:#2a4a6a"/>
      <stop offset="100%" style="stop-color:#0a1520"/>
    </linearGradient>

    <!-- Pentagram DOWN - dusty rose -->
    <linearGradient id="pentaDown" x1="0%" y1="70%" x2="70%" y2="0%">
      <stop offset="0%" style="stop-color:#9a6a7a"/>
      <stop offset="30%" style="stop-color:#6a3a4a"/>
      <stop offset="100%" style="stop-color:#200a10"/>
    </linearGradient>

    <!-- Hexagram UP triangle - aged gold -->
    <linearGradient id="hexUp" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" style="stop-color:#9a8a4a"/>
      <stop offset="30%" style="stop-color:#6a5a2a"/>
      <stop offset="100%" style="stop-color:#201a0a"/>
    </linearGradient>

    <!-- Hexagram DOWN triangle - forest green -->
    <linearGradient id="hexDown" x1="0%" y1="100%" x2="60%" y2="0%">
      <stop offset="0%" style="stop-color:#4a8a5a"/>
      <stop offset="30%" style="stop-color:#2a5a3a"/>
      <stop offset="100%" style="stop-color:#0a2010"/>
    </linearGradient>

    <!-- Inner circle - deep violet -->
    <radialGradient id="innerCircle" cx="20%" cy="20%" r="80%">
      <stop offset="0%" style="stop-color:#6a5a8a"/>
      <stop offset="40%" style="stop-color:#3a2a5a"/>
      <stop offset="100%" style="stop-color:#100a1a"/>
    </radialGradient>

    <!-- Outer halo - burnt sienna -->
    <linearGradient id="outerRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8a5a3a"/>
      <stop offset="35%" style="stop-color:#5a3a2a"/>
      <stop offset="100%" style="stop-color:#1a0a05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="#050505"/>

  <!-- Outer decorative circle -->
  <circle cx="400" cy="400" r="380" fill="url(#outerRing)" opacity="0.3"/>
  <circle cx="400" cy="400" r="380" fill="none" stroke="#0a0a0a" stroke-width="6"/>

  <!-- Layer 1: Hexagram UP (gold triangle pointing up) -->
  <g style="mix-blend-mode: screen;">
    <polygon points="400,60 680,520 120,520"
             fill="url(#hexUp)" opacity="0.7"/>
  </g>

  <!-- Layer 2: Hexagram DOWN (green triangle pointing down) -->
  <g style="mix-blend-mode: screen;">
    <polygon points="400,740 120,280 680,280"
             fill="url(#hexDown)" opacity="0.7"/>
  </g>

  <!-- Layer 3: Pentagram UP (blue) -->
  <g style="mix-blend-mode: screen;">
    <polygon points="400,80 478,310 700,310 522,450 580,680 400,540 220,680 278,450 100,310 322,310"
             fill="url(#pentaUp)" opacity="0.6"/>
  </g>

  <!-- Layer 4: Pentagram DOWN (rose) -->
  <g style="mix-blend-mode: screen;">
    <polygon points="400,720 322,490 100,490 278,350 220,120 400,260 580,120 522,350 700,490 478,490"
             fill="url(#pentaDown)" opacity="0.6"/>
  </g>

  <!-- Inner circle overlay -->
  <circle cx="400" cy="400" r="120" fill="url(#innerCircle)" style="mix-blend-mode: screen;" opacity="0.5"/>

  <!-- BLACK OUTLINES - all stars -->

  <!-- Hexagram UP outline -->
  <polygon points="400,60 680,520 120,520"
           fill="none" stroke="#0a0a0a" stroke-width="4"/>

  <!-- Hexagram DOWN outline -->
  <polygon points="400,740 120,280 680,280"
           fill="none" stroke="#0a0a0a" stroke-width="4"/>

  <!-- Pentagram UP outline -->
  <polygon points="400,80 478,310 700,310 522,450 580,680 400,540 220,680 278,450 100,310 322,310"
           fill="none" stroke="#0a0a0a" stroke-width="3"/>

  <!-- Pentagram DOWN outline -->
  <polygon points="400,720 322,490 100,490 278,350 220,120 400,260 580,120 522,350 700,490 478,490"
           fill="none" stroke="#0a0a0a" stroke-width="3"/>

  <!-- Inner star lines (the inner pentagon connections) -->
  <!-- Pentagram UP inner lines -->
  <line x1="400" y1="80" x2="580" y2="680" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="400" y1="80" x2="220" y2="680" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="700" y1="310" x2="220" y2="680" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="100" y1="310" x2="580" y2="680" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="700" y1="310" x2="100" y2="310" stroke="#0a0a0a" stroke-width="2"/>

  <!-- Pentagram DOWN inner lines -->
  <line x1="400" y1="720" x2="220" y2="120" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="400" y1="720" x2="580" y2="120" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="100" y1="490" x2="580" y2="120" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="700" y1="490" x2="220" y2="120" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="100" y1="490" x2="700" y2="490" stroke="#0a0a0a" stroke-width="2"/>

  <!-- Hexagram inner lines (creating the center hexagon) -->
  <line x1="400" y1="60" x2="400" y2="740" stroke="#0a0a0a" stroke-width="2" opacity="0.5"/>
  <line x1="120" y1="280" x2="680" y2="520" stroke="#0a0a0a" stroke-width="2" opacity="0.5"/>
  <line x1="680" y1="280" x2="120" y2="520" stroke="#0a0a0a" stroke-width="2" opacity="0.5"/>

  <!-- Center circle outline -->
  <circle cx="400" cy="400" r="120" fill="none" stroke="#0a0a0a" stroke-width="3"/>

  <!-- The (.) at center -->
  <circle cx="400" cy="400" r="8" fill="#3a3a3a"/>

</svg>
