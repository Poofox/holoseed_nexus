<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <!-- Emboss gradients - light from left, shadow to right -->

    <!-- Cell 1: Top point - dusty rose -->
    <linearGradient id="cell1" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#c4929a"/>
      <stop offset="25%" style="stop-color:#8b5a62"/>
      <stop offset="100%" style="stop-color:#1a0a0c"/>
    </linearGradient>

    <!-- Cell 2: Upper-right - aged amber (angled for that corner) -->
    <linearGradient id="cell2" x1="0%" y1="0%" x2="100%" y2="80%">
      <stop offset="0%" style="stop-color:#c4a052"/>
      <stop offset="25%" style="stop-color:#8b7232"/>
      <stop offset="100%" style="stop-color:#1a1408"/>
    </linearGradient>

    <!-- Cell 3: Lower-right - forest teal -->
    <linearGradient id="cell3" x1="0%" y1="100%" x2="100%" y2="20%">
      <stop offset="0%" style="stop-color:#52a49a"/>
      <stop offset="25%" style="stop-color:#327268"/>
      <stop offset="100%" style="stop-color:#081a18"/>
    </linearGradient>

    <!-- Cell 4: Bottom - deep violet -->
    <linearGradient id="cell4" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#9a7ab8"/>
      <stop offset="25%" style="stop-color:#5a4878"/>
      <stop offset="100%" style="stop-color:#0c0810"/>
    </linearGradient>

    <!-- Cell 5: Lower-left - sage green -->
    <linearGradient id="cell5" x1="0%" y1="20%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8aa872"/>
      <stop offset="25%" style="stop-color:#5a7248"/>
      <stop offset="100%" style="stop-color:#0c140a"/>
    </linearGradient>

    <!-- Cell 6: Upper-left - copper brown -->
    <linearGradient id="cell6" x1="0%" y1="80%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b8845a"/>
      <stop offset="25%" style="stop-color:#785438"/>
      <stop offset="100%" style="stop-color:#140c08"/>
    </linearGradient>

    <!-- Cell 7: Center hexagon - muted gold -->
    <linearGradient id="cell7" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#b8a870"/>
      <stop offset="20%" style="stop-color:#8a7a48"/>
      <stop offset="100%" style="stop-color:#181408"/>
    </linearGradient>

  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="#0a0a0a"/>

  <!-- Outer circle frame -->
  <circle cx="400" cy="400" r="365" fill="none" stroke="#1a1a1a" stroke-width="15"/>
  <circle cx="400" cy="400" r="358" fill="none" stroke="#0a0a0a" stroke-width="2"/>

  <!-- FILLED CELLS with emboss gradients -->

  <!-- Cell 1: Top point -->
  <polygon points="400,50 299,225 501,225"
           fill="url(#cell1)" stroke="#0a0a0a" stroke-width="4"/>

  <!-- Cell 2: Upper-right point -->
  <polygon points="703,225 501,225 602,400"
           fill="url(#cell2)" stroke="#0a0a0a" stroke-width="4"/>

  <!-- Cell 3: Lower-right point -->
  <polygon points="703,575 602,400 501,575"
           fill="url(#cell3)" stroke="#0a0a0a" stroke-width="4"/>

  <!-- Cell 4: Bottom point -->
  <polygon points="400,750 501,575 299,575"
           fill="url(#cell4)" stroke="#0a0a0a" stroke-width="4"/>

  <!-- Cell 5: Lower-left point -->
  <polygon points="97,575 299,575 198,400"
           fill="url(#cell5)" stroke="#0a0a0a" stroke-width="4"/>

  <!-- Cell 6: Upper-left point -->
  <polygon points="97,225 198,400 299,225"
           fill="url(#cell6)" stroke="#0a0a0a" stroke-width="4"/>

  <!-- Cell 7: Center hexagon -->
  <polygon points="299,225 198,400 299,575 501,575 602,400 501,225"
           fill="url(#cell7)" stroke="#0a0a0a" stroke-width="4"/>

  <!-- Triangle outlines on top for crispness -->

  <!-- Up triangle outline -->
  <polygon points="400,50 703,575 97,575"
           fill="none" stroke="#0a0a0a" stroke-width="5"/>

  <!-- Down triangle outline -->
  <polygon points="400,750 97,225 703,225"
           fill="none" stroke="#0a0a0a" stroke-width="5"/>

  <!-- Internal division lines (the hexagon edges) -->
  <line x1="299" y1="225" x2="501" y2="225" stroke="#0a0a0a" stroke-width="3"/>
  <line x1="501" y1="225" x2="602" y2="400" stroke="#0a0a0a" stroke-width="3"/>
  <line x1="602" y1="400" x2="501" y2="575" stroke="#0a0a0a" stroke-width="3"/>
  <line x1="501" y1="575" x2="299" y2="575" stroke="#0a0a0a" stroke-width="3"/>
  <line x1="299" y1="575" x2="198" y2="400" stroke="#0a0a0a" stroke-width="3"/>
  <line x1="198" y1="400" x2="299" y2="225" stroke="#0a0a0a" stroke-width="3"/>

</svg>
