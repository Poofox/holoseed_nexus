<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <!-- Gradients for each cell -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#4a1942"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1b4e"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d2137"/>
      <stop offset="100%" style="stop-color:#1a4a3a"/>
    </linearGradient>
    <linearGradient id="g4" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#3d1c02"/>
      <stop offset="100%" style="stop-color:#6b2d0a"/>
    </linearGradient>
    <linearGradient id="g5" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#4a0e4e"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="g6" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#2a1a4a"/>
    </linearGradient>
    <radialGradient id="gcenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#8b4513"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="50%" style="stop-color:#b8860b"/>
      <stop offset="100%" style="stop-color:#ffd700"/>
    </linearGradient>

    <!-- Electric blue accent -->
    <linearGradient id="electric" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffff"/>
      <stop offset="50%" style="stop-color:#0080ff"/>
      <stop offset="100%" style="stop-color:#00ffff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="#000000"/>

  <!-- Outer circle (Leonardo proportion) -->
  <circle cx="400" cy="400" r="380" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.5"/>
  <circle cx="400" cy="400" r="235" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>

  <!-- Hexagram (Star of Solomon) - filled triangles -->
  <!-- Upward triangle -->
  <polygon points="400,50 680,530 120,530" fill="url(#g1)" stroke="url(#gold)" stroke-width="2"/>
  <!-- Downward triangle -->
  <polygon points="400,750 120,270 680,270" fill="url(#g2)" stroke="url(#gold)" stroke-width="2"/>

  <!-- Inner hexagram cells (the overlapping sections) -->
  <!-- Top cell -->
  <polygon points="400,50 306,203 494,203" fill="url(#g3)"/>
  <!-- Upper right -->
  <polygon points="494,203 680,270 588,400" fill="url(#g4)"/>
  <!-- Lower right -->
  <polygon points="588,400 680,530 494,597" fill="url(#g5)"/>
  <!-- Bottom -->
  <polygon points="494,597 400,750 306,597" fill="url(#g6)"/>
  <!-- Lower left -->
  <polygon points="306,597 120,530 212,400" fill="url(#g4)"/>
  <!-- Upper left -->
  <polygon points="212,400 120,270 306,203" fill="url(#g5)"/>
  <!-- Center hexagon -->
  <polygon points="306,203 494,203 588,400 494,597 306,597 212,400" fill="url(#g1)" stroke="url(#electric)" stroke-width="1"/>

  <!-- Pentagram pointing UP -->
  <polygon points="400,100 485,340 650,340 520,480 570,700 400,560 230,700 280,480 150,340 315,340"
           fill="none" stroke="url(#electric)" stroke-width="2" opacity="0.7"/>

  <!-- Pentagram pointing DOWN (inverted) -->
  <polygon points="400,700 315,460 150,460 280,320 230,100 400,240 570,100 520,320 650,460 485,460"
           fill="none" stroke="#ff00ff" stroke-width="2" opacity="0.5"/>

  <!-- Inner pentagram cells with gradients -->
  <!-- These are the intersection zones -->
  <polygon points="400,240 450,340 400,380 350,340" fill="url(#gcenter)" opacity="0.6"/>
  <polygon points="350,340 280,320 300,380 350,400" fill="url(#g3)" opacity="0.5"/>
  <polygon points="450,340 520,320 500,380 450,400" fill="url(#g4)" opacity="0.5"/>
  <polygon points="350,460 300,420 280,480 315,460" fill="url(#g5)" opacity="0.5"/>
  <polygon points="450,460 500,420 520,480 485,460" fill="url(#g6)" opacity="0.5"/>

  <!-- Vitruvian circle (golden ratio inner) -->
  <circle cx="400" cy="400" r="145" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.6"/>

  <!-- Center symbol (.) -->
  <circle cx="400" cy="400" r="50" fill="none" stroke="url(#electric)" stroke-width="2"/>
  <circle cx="400" cy="400" r="8" fill="url(#gcenter)"/>

  <!-- Decorative rays (Leonardo-style) -->
  <g stroke="url(#gold)" stroke-width="0.5" opacity="0.3">
    <line x1="400" y1="400" x2="400" y2="20"/>
    <line x1="400" y1="400" x2="780" y2="400"/>
    <line x1="400" y1="400" x2="400" y2="780"/>
    <line x1="400" y1="400" x2="20" y2="400"/>
    <line x1="400" y1="400" x2="669" y2="131"/>
    <line x1="400" y1="400" x2="669" y2="669"/>
    <line x1="400" y1="400" x2="131" y2="669"/>
    <line x1="400" y1="400" x2="131" y2="131"/>
  </g>

  <!-- The Four Elements markers -->
  <g font-family="serif" font-size="24" fill="url(#gold)" text-anchor="middle">
    <text x="400" y="35">0</text>
    <text x="765" y="408">43</text>
    <text x="400" y="785">47</text>
    <text x="35" y="408">37</text>
  </g>

  <!-- Outer decorative ring -->
  <circle cx="400" cy="400" r="390" fill="none" stroke="url(#gold)" stroke-width="1" stroke-dasharray="10,5" opacity="0.4"/>
</svg>
