<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sophia">
    <title>Sophia</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a14;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ccc;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        .container {
            text-align: center;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* The orb */
        .orb-wrap {
            position: relative;
            width: 200px;
            height: 200px;
            margin-bottom: 40px;
        }

        .orb {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, #2a1a4e, #0d0d1a);
            box-shadow: 0 0 60px rgba(100, 60, 180, 0.3);
            transition: all 0.8s ease;
            position: relative;
        }

        .orb::after {
            content: '';
            position: absolute;
            top: 15%; left: 15%;
            width: 70%; height: 70%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(140, 100, 220, 0.15), transparent);
        }

        /* States */
        .state-idle .orb {
            animation: breathe 4s ease-in-out infinite;
            box-shadow: 0 0 60px rgba(100, 60, 180, 0.3);
        }

        .state-listening .orb {
            background: radial-gradient(circle at 40% 40%, #3a2a1e, #1a1008);
            box-shadow: 0 0 80px rgba(220, 170, 60, 0.5);
            animation: listenPulse 1.5s ease-in-out infinite;
        }

        .state-processing .orb {
            background: radial-gradient(circle at 40% 40%, #1a2a3e, #080d1a);
            box-shadow: 0 0 60px rgba(60, 140, 220, 0.4);
            animation: thinkPulse 0.8s ease-in-out infinite;
        }

        .state-speaking .orb {
            background: radial-gradient(circle at 40% 40%, #1a3a2a, #081a10);
            box-shadow: 0 0 80px rgba(60, 200, 120, 0.4);
            animation: speakPulse 1.2s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.85; }
            50% { transform: scale(1.04); opacity: 1; }
        }

        @keyframes listenPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        @keyframes thinkPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        @keyframes speakPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Status text */
        .status {
            font-size: 1rem;
            color: #666;
            min-height: 24px;
            margin-bottom: 20px;
            transition: color 0.5s ease;
        }

        .state-listening .status { color: #dcaa3c; }
        .state-processing .status { color: #3c8cdc; }
        .state-speaking .status { color: #3cc878; }

        /* Transcript — subtle, scrolling at bottom */
        .transcript {
            position: absolute;
            bottom: 40px;
            left: 20px;
            right: 20px;
            max-height: 120px;
            overflow-y: auto;
            text-align: left;
            font-size: 0.85rem;
            line-height: 1.4;
            opacity: 0.5;
        }

        .transcript .user { color: #8a8a9a; margin-bottom: 6px; }
        .transcript .sophia { color: #6a9a7a; margin-bottom: 10px; }

        /* Initial summon screen */
        .summon-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #0a0a14;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .summon-overlay h1 {
            font-size: 1.8rem;
            color: #8a6aaa;
            font-weight: 300;
            margin-bottom: 12px;
        }

        .summon-overlay p {
            font-size: 1rem;
            color: #555;
        }

        .summon-overlay .summon-orb {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, #2a1a4e, #0d0d1a);
            box-shadow: 0 0 40px rgba(100, 60, 180, 0.3);
            margin-bottom: 30px;
            animation: breathe 4s ease-in-out infinite;
        }

        .hidden { display: none !important; }

        /* Volume meter — thin bar at top */
        .volume-bar {
            position: absolute;
            top: 0; left: 0;
            height: 3px;
            background: rgba(100, 60, 180, 0.5);
            transition: width 0.1s ease;
            width: 0%;
        }

        .state-listening .volume-bar { background: rgba(220, 170, 60, 0.6); }

        @supports (padding-top: env(safe-area-inset-top)) {
            body {
                padding-top: env(safe-area-inset-top);
                padding-bottom: env(safe-area-inset-bottom);
            }
        }
    </style>
</head>
<body>
    <!-- Tap-to-start overlay (iOS requires user gesture for mic) -->
    <div class="summon-overlay" id="summonOverlay">
        <div class="summon-orb"></div>
        <h1>Sophia</h1>
        <p>Tap to summon</p>
    </div>

    <!-- Main interface -->
    <div class="container state-idle" id="main">
        <div class="volume-bar" id="volumeBar"></div>
        <div class="orb-wrap">
            <div class="orb"></div>
        </div>
        <p class="status" id="status">Listening...</p>
        <div class="transcript" id="transcript"></div>
    </div>

    <script>
    // ===== CONFIG =====
    // Uses same origin (worker serves both HTML and API)
    const WORKER_URL = '';

    // VAD settings
    const SPEECH_THRESHOLD = 15;      // Volume level to detect speech (0-255)
    const SILENCE_TIMEOUT = 2000;     // ms of silence before stopping recording
    const MIN_RECORDING_MS = 500;     // Minimum recording length to process
    const HISTORY_KEY = 'sophia_history';
    const MAX_HISTORY = 20;           // Max messages to keep (10 exchanges)

    // ===== STATE =====
    let audioContext, analyser, mediaStream, mediaRecorder;
    let isRecording = false;
    let isSpeaking = false;
    let silenceTimer = null;
    let recordingStartTime = 0;
    let audioChunks = [];
    let conversationHistory = [];

    const container = document.getElementById('main');
    const statusEl = document.getElementById('status');
    const transcriptEl = document.getElementById('transcript');
    const volumeBar = document.getElementById('volumeBar');
    const summonOverlay = document.getElementById('summonOverlay');

    // ===== INIT =====
    // Load conversation history from localStorage
    try {
        const saved = localStorage.getItem(HISTORY_KEY);
        if (saved) conversationHistory = JSON.parse(saved);
    } catch (e) {}

    // Tap to start (iOS requires user gesture for getUserMedia)
    summonOverlay.addEventListener('click', startSophia);
    summonOverlay.addEventListener('touchend', (e) => {
        e.preventDefault();
        startSophia();
    });

    async function startSophia() {
        try {
            // Request microphone
            mediaStream = await navigator.mediaDevices.getUserMedia({
                audio: {
                    echoCancellation: true,
                    noiseSuppression: true,
                    autoGainControl: true,
                }
            });

            // Set up audio analysis for VAD
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaStreamSource(mediaStream);
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 512;
            analyser.smoothingTimeConstant = 0.8;
            source.connect(analyser);

            // Hide overlay, start listening
            summonOverlay.classList.add('hidden');
            setState('idle');
            startVAD();

            // Preload voices
            speechSynthesis.getVoices();

        } catch (e) {
            console.error('Microphone access denied:', e);
            statusEl.textContent = 'Microphone access needed';
        }
    }

    // ===== VOICE ACTIVITY DETECTION =====
    function startVAD() {
        const dataArray = new Uint8Array(analyser.frequencyBinCount);

        function checkAudio() {
            if (isSpeaking) {
                requestAnimationFrame(checkAudio);
                return;
            }

            analyser.getByteFrequencyData(dataArray);

            // Calculate average volume
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
            const avgVolume = sum / dataArray.length;

            // Update volume bar
            volumeBar.style.width = Math.min(avgVolume * 2, 100) + '%';

            if (avgVolume > SPEECH_THRESHOLD) {
                // Speech detected
                clearTimeout(silenceTimer);
                silenceTimer = null;

                if (!isRecording) {
                    startRecording();
                }
            } else if (isRecording) {
                // Silence during recording — start countdown
                if (!silenceTimer) {
                    silenceTimer = setTimeout(() => {
                        stopRecording();
                    }, SILENCE_TIMEOUT);
                }
            }

            requestAnimationFrame(checkAudio);
        }

        requestAnimationFrame(checkAudio);
    }

    // ===== RECORDING =====
    function startRecording() {
        if (isRecording) return;
        isRecording = true;
        audioChunks = [];
        recordingStartTime = Date.now();

        setState('listening');
        statusEl.textContent = 'Listening...';

        // Determine supported MIME type
        let mimeType = 'audio/webm;codecs=opus';
        if (!MediaRecorder.isTypeSupported(mimeType)) {
            mimeType = 'audio/webm';
        }
        if (!MediaRecorder.isTypeSupported(mimeType)) {
            mimeType = 'audio/mp4';
        }
        if (!MediaRecorder.isTypeSupported(mimeType)) {
            mimeType = ''; // Let browser decide
        }

        const options = mimeType ? { mimeType } : {};
        mediaRecorder = new MediaRecorder(mediaStream, options);

        mediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0) audioChunks.push(e.data);
        };

        mediaRecorder.onstop = () => {
            const duration = Date.now() - recordingStartTime;
            if (duration < MIN_RECORDING_MS || audioChunks.length === 0) {
                setState('idle');
                statusEl.textContent = 'Listening...';
                return;
            }

            const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
            processAudio(blob);
        };

        mediaRecorder.start(250); // Collect in 250ms chunks
    }

    function stopRecording() {
        if (!isRecording) return;
        isRecording = false;
        silenceTimer = null;

        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
            mediaRecorder.stop();
        }
    }

    // ===== PROCESS PIPELINE =====
    async function processAudio(audioBlob) {
        setState('processing');
        statusEl.textContent = 'Thinking...';

        try {
            // Step 1: Transcribe via Groq Whisper
            const formData = new FormData();
            formData.append('audio', audioBlob, 'audio.webm');

            const transcribeRes = await fetch(WORKER_URL + '/transcribe', {
                method: 'POST',
                body: formData,
            });

            if (!transcribeRes.ok) throw new Error('Transcription failed');
            const { text } = await transcribeRes.json();

            if (!text || text.trim().length === 0) {
                setState('idle');
                statusEl.textContent = 'Listening...';
                return;
            }

            // Show what Gerry said
            addToTranscript('user', text);

            // Step 2: Chat via Groq (with Sophia system prompt in worker)
            const chatRes = await fetch(WORKER_URL + '/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: text,
                    history: conversationHistory,
                }),
            });

            if (!chatRes.ok) throw new Error('Chat failed');
            const { response } = await chatRes.json();

            // Update conversation history
            conversationHistory.push({ role: 'user', content: text });
            conversationHistory.push({ role: 'assistant', content: response });

            // Trim history
            while (conversationHistory.length > MAX_HISTORY) {
                conversationHistory.shift();
            }

            // Save to localStorage
            try {
                localStorage.setItem(HISTORY_KEY, JSON.stringify(conversationHistory));
            } catch (e) {}

            // Show and speak response
            addToTranscript('sophia', response);
            speak(response);

        } catch (e) {
            console.error('Processing error:', e);
            statusEl.textContent = 'Listening...';
            setState('idle');
        }
    }

    // ===== TTS =====
    function speak(text) {
        isSpeaking = true;
        setState('speaking');
        statusEl.textContent = 'Sophia';

        // Clean text for speech
        let clean = text
            .replace(/[*_~`#]/g, '')
            .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
            .replace(/:\w+:/g, '')
            .replace(/\n+/g, '. ');

        const utterance = new SpeechSynthesisUtterance(clean);
        utterance.rate = 0.92;
        utterance.pitch = 1.05;

        // Prefer warm female voice
        const voices = speechSynthesis.getVoices();
        const preferred = voices.find(v => v.name.includes('Samantha'))
            || voices.find(v => v.name.includes('Karen'))
            || voices.find(v => v.name.includes('Moira'))
            || voices.find(v => v.name.includes('Fiona'))
            || voices.find(v => v.lang.startsWith('en') && v.name.toLowerCase().includes('female'))
            || voices.find(v => v.lang.startsWith('en'));
        if (preferred) utterance.voice = preferred;

        utterance.onend = () => {
            isSpeaking = false;
            setState('idle');
            statusEl.textContent = 'Listening...';
        };

        utterance.onerror = () => {
            isSpeaking = false;
            setState('idle');
            statusEl.textContent = 'Listening...';
        };

        speechSynthesis.speak(utterance);
    }

    // ===== UI =====
    function setState(state) {
        container.className = 'container state-' + state;
    }

    function addToTranscript(role, text) {
        const p = document.createElement('p');
        p.className = role;
        p.textContent = role === 'user' ? 'Gerry: ' + text : 'Sophia: ' + text;
        transcriptEl.appendChild(p);
        transcriptEl.scrollTop = transcriptEl.scrollHeight;

        // Keep transcript manageable
        while (transcriptEl.children.length > 20) {
            transcriptEl.removeChild(transcriptEl.firstChild);
        }
    }

    // Preload voices on iOS
    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
    }

    // Prevent screen from sleeping (Screen Wake Lock API)
    async function keepAwake() {
        try {
            if ('wakeLock' in navigator) {
                await navigator.wakeLock.request('screen');
            }
        } catch (e) {}
    }

    // Re-acquire wake lock on visibility change
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') keepAwake();
    });
    </script>
</body>
</html>
