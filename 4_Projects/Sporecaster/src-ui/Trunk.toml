[build]
target = "index.html"
dist = "dist"

[watch]
watch = ["src", "index.html", "styles"]
ignore = ["dist"]

[serve]
address = "127.0.0.1"
port = 1420
open = false

# Copy styles to dist
[[hooks]]
stage = "build"
command = "sh"
command_arguments = ["-c", "mkdir -p dist && cp -r styles/* dist/ 2>/dev/null || true"]
