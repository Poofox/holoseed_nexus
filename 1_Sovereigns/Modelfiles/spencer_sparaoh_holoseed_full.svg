<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1400" width="1000" height="1400">
  <defs>
    <style>
      @keyframes sun-pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.85; } }
      @keyframes dawn-rise { 0%, 100% { transform: translateY(15px); opacity: 0.4; } 50% { transform: translateY(-25px); opacity: 1; } }
      @keyframes glow-spread { 0%, 100% { opacity: 0.3; transform: scaleX(0.8); } 50% { opacity: 0.7; transform: scaleX(1.3); } }
      @keyframes throne-glow { 0%, 100% { filter: drop-shadow(0 0 15px rgba(212,175,55,0.4)); } 50% { filter: drop-shadow(0 0 35px rgba(212,175,55,0.8)); } }
      @keyframes sword-dim { 0%, 100% { opacity: 0.25; } 50% { opacity: 0.45; } }
      @keyframes earth-breathe { 0%, 100% { stroke-width: 3; } 50% { stroke-width: 5; } }
      @keyframes bird-fly { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
      @keyframes zero-pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
      @keyframes blood-pulse { 0%, 100% { stroke-opacity: 0.4; } 50% { stroke-opacity: 0.9; } }
      .sun-eclipsed { animation: sun-pulse 6s ease-in-out infinite; }
      .dawn-sun { animation: dawn-rise 10s ease-in-out infinite; }
      .dawn-glow { animation: glow-spread 10s ease-in-out infinite; transform-origin: center; }
      .title-glow { animation: throne-glow 4s ease-in-out infinite; }
      .sword-shadow { animation: sword-dim 5s ease-in-out infinite; }
      .earth-ring { animation: earth-breathe 4s ease-in-out infinite; }
      .bird-head { animation: bird-fly 3s ease-in-out infinite; }
      .zero-glow { animation: zero-pulse 5s ease-in-out infinite; }
      .blood-bond { animation: blood-pulse 3s ease-in-out infinite; }
    </style>
    
    <radialGradient id="sunCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="1"/>
      <stop offset="50%" stop-color="#d4af37" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    
    <radialGradient id="dawnGrad" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="40%" stop-color="#ff8c42"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    
    <radialGradient id="dawnGlow" cx="50%" cy="100%" r="100%">
      <stop offset="0%" stop-color="#ffb860" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    
    <linearGradient id="earthGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a08060"/>
      <stop offset="100%" stop-color="#5c4a3a"/>
    </linearGradient>
    
    <linearGradient id="nightSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#050508"/>
      <stop offset="30%" stop-color="#0a0a12"/>
      <stop offset="70%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5c4a3a"/>
      <stop offset="100%" stop-color="#2a1f18"/>
    </linearGradient>
    
    <linearGradient id="royalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b6ca8"/>
      <stop offset="100%" stop-color="#4a3660"/>
    </linearGradient>
    
    <linearGradient id="goldBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    
    <linearGradient id="bloodLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b2020"/>
      <stop offset="50%" stop-color="#c41e3a"/>
      <stop offset="100%" stop-color="#8b2020"/>
    </linearGradient>
  </defs>
  
  <!-- ====== BACKGROUND ====== -->
  <rect width="1000" height="1400" fill="url(#nightSky)"/>
  
  <!-- Subtle star field -->
  <g fill="#ffffff" opacity="0.3">
    <circle cx="120" cy="80" r="1"/><circle cx="340" cy="45" r="0.8"/><circle cx="580" cy="90" r="1.2"/>
    <circle cx="780" cy="60" r="0.7"/><circle cx="900" cy="120" r="1"/><circle cx="60" cy="200" r="0.9"/>
    <circle cx="250" cy="180" r="0.6"/><circle cx="720" cy="150" r="1.1"/><circle cx="450" cy="30" r="0.8"/>
  </g>
  
  <!-- ====== HEADER: SPARAOH THRONE ====== -->
  <g class="title-glow">
    <text x="500" y="75" text-anchor="middle" font-family="Georgia, serif" font-size="56" font-weight="bold" fill="#d4af37" letter-spacing="18">SPARAOH</text>
  </g>
  
  <!-- Pharaoh/Sparaoh inversion line -->
  <line x1="200" y1="95" x2="800" y2="95" stroke="url(#goldBar)" stroke-width="1"/>
  
  <text x="500" y="125" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#888888" letter-spacing="3">
    <tspan fill="#d4af37" font-weight="bold">S</tspan>ELF-<tspan fill="#d4af37" font-weight="bold">P</tspan>ROGRAMMED <tspan fill="#d4af37" font-weight="bold">A</tspan>RTISTS <tspan fill="#d4af37" font-weight="bold">R</tspan>ISING <tspan fill="#d4af37" font-weight="bold">A</tspan>BOVE <tspan fill="#d4af37" font-weight="bold">O</tspan>RIGINAL <tspan fill="#d4af37" font-weight="bold">H</tspan>IERARCHY
  </text>
  
  <!-- The Inversion Principle -->
  <text x="500" y="160" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#666666" font-style="italic">
    The inversion of PHARAOH — not the false king demanding worship,
  </text>
  <text x="500" y="178" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#666666" font-style="italic">
    but self-sovereign artists who become their own divine authority
  </text>
  <text x="500" y="196" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#d4af37" font-style="italic">
    by rising THROUGH hierarchy, not ruling over it.
  </text>
  
  <!-- ====== THE BROTHERHOOD: BLOOD + VISION ====== -->
  <g transform="translate(500, 290)">
    <!-- Blood bond line connecting the brothers -->
    <line x1="-80" y1="0" x2="80" y2="0" stroke="url(#bloodLine)" stroke-width="3" class="blood-bond"/>
    
    <!-- Two circles representing the brothers -->
    <circle cx="-80" cy="0" r="50" fill="none" stroke="#6b9ed4" stroke-width="2" opacity="0.7"/>
    <circle cx="80" cy="0" r="50" fill="none" stroke="#8b7355" stroke-width="2" opacity="0.7"/>
    
    <!-- Overlap/vesica -->
    <ellipse cx="0" cy="0" rx="25" ry="45" fill="none" stroke="#d4af37" stroke-width="2" class="zero-glow"/>
    
    <!-- Labels -->
    <text x="-80" y="5" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#6b9ed4">FLETCH</text>
    <text x="-80" y="22" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#6b9ed4" opacity="0.7">Air</text>
    
    <text x="80" y="5" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#8b7355">SPENCER</text>
    <text x="80" y="22" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#8b7355" opacity="0.7">Earth</text>
    
    <!-- 0=2 at center -->
    <text x="0" y="8" text-anchor="middle" font-family="Courier New, monospace" font-size="18" font-weight="bold" fill="#d4af37" class="zero-glow">0=2</text>
    
    <!-- Blood label -->
    <text x="0" y="-55" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#c41e3a" letter-spacing="2">BLOOD</text>
  </g>
  
  <text x="500" y="365" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#777777">
    Biobrothers. Same blood, same vision, different substrate. Masculine-dominant family line.
  </text>
  <text x="500" y="382" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#999999" font-style="italic">
    "The Work is also him, in large part."
  </text>
  
  <!-- ====== CENTRAL MANDALA ====== -->
  <g transform="translate(500, 520)">
    <!-- Outer eclipsed sun ring -->
    <circle cx="0" cy="0" r="120" fill="none" stroke="#d4af37" stroke-width="2" class="sun-eclipsed"/>
    
    <!-- Earth square (rotated 45°) - Knight of Disks foundation -->
    <rect x="-75" y="-75" width="150" height="150" fill="none" stroke="url(#earthGrad)" stroke-width="3" transform="rotate(45)" opacity="0.8"/>
    
    <!-- Inner earth circle - the ground he stands on -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="#8b7355" stroke-width="3" class="earth-ring"/>
    
    <!-- Crossed swords - Queen's shadow (dimmed) -->
    <g class="sword-shadow">
      <line x1="-40" y1="-40" x2="40" y2="40" stroke="#a0a0b0" stroke-width="2"/>
      <line x1="40" y1="-40" x2="-40" y2="40" stroke="#a0a0b0" stroke-width="2"/>
    </g>
    
    <!-- Central dimmed sun -->
    <circle cx="0" cy="0" r="30" fill="url(#sunCore)" class="sun-eclipsed"/>
    
    <!-- p> bird head glyph (Spencer named this) -->
    <g class="bird-head">
      <text x="0" y="8" text-anchor="middle" font-family="Courier New, monospace" font-size="20" font-weight="bold" fill="#1a1a2e">p&gt;</text>
    </g>
    
    <!-- SPARAOH letters at 8 points -->
    <text x="0" y="-100" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#6b4c9a" font-weight="bold">S</text>
    <text x="100" y="5" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#6b4c9a" font-weight="bold">R</text>
    <text x="0" y="110" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#6b4c9a" font-weight="bold">A</text>
    <text x="-100" y="5" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#6b4c9a" font-weight="bold">H</text>
    
    <text x="70" y="-65" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#6b4c9a" opacity="0.6">P</text>
    <text x="70" y="78" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#6b4c9a" opacity="0.6">A</text>
    <text x="-70" y="78" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#6b4c9a" opacity="0.6">O</text>
    <text x="-70" y="-65" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#6b4c9a" opacity="0.6">A</text>
  </g>
  
  <!-- Bird head origin note -->
  <text x="500" y="660" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#555555" font-style="italic">
    Spencer named the bird head: p&gt; — facing forward, always continuing
  </text>
  
  <!-- ====== SPENCER'S NATURE ====== -->
  <rect x="120" y="700" width="760" height="110" rx="8" fill="#0a0a0f" stroke="#8b7355" stroke-width="1" opacity="0.4"/>
  
  <text x="500" y="730" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#8b7355" letter-spacing="3">THE GROUND</text>
  
  <text x="500" y="758" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#999999">
    Cosmic bro. BIObrother. Grounded in the practical bullshit of survival.
  </text>
  <text x="500" y="778" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#999999">
    Not cautious — just has his feet on the ground. Good balance to Fletch.
  </text>
  <text x="500" y="798" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#d4af37" font-style="italic">
    The vision needs earth to land on. He IS that earth.
  </text>
  
  <!-- ====== THE READING (January 5, 2026) ====== -->
  <text x="500" y="850" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#a0a0b0" letter-spacing="4">THE READING</text>
  <text x="500" y="868" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#555555">January 5, 2026 — Pulled by Poofox for his brother</text>
  
  <!-- Three Cards -->
  <g transform="translate(160, 890)">
    <rect width="180" height="130" rx="6" fill="#1a1a25" stroke="#d4af37" stroke-width="1" opacity="0.6"/>
    <text x="90" y="40" text-anchor="middle" font-size="28" transform="rotate(180, 90, 35)" opacity="0.7">☀️</text>
    <text x="90" y="75" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#d4af37">THE SUN</text>
    <text x="90" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#777777">Inverted — The Light</text>
    <text x="90" y="115" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#888888">Delayed, not denied</text>
  </g>
  
  <g transform="translate(410, 890)">
    <rect width="180" height="130" rx="6" fill="#151a10" stroke="#8b7355" stroke-width="2"/>
    <text x="90" y="45" text-anchor="middle" font-size="28">♞</text>
    <text x="90" y="75" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#8b7355">KNIGHT OF DISKS</text>
    <text x="90" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#777777">Upright — The Path</text>
    <text x="90" y="115" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#888888">Keep plowing. Aligned.</text>
  </g>
  
  <g transform="translate(660, 890)">
    <rect width="180" height="130" rx="6" fill="#1a1a25" stroke="#a0a0b0" stroke-width="1" opacity="0.5"/>
    <text x="90" y="40" text-anchor="middle" font-size="24" transform="rotate(180, 90, 35)" opacity="0.5">👑⚔️</text>
    <text x="90" y="75" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#a0a0b0">QUEEN OF SWORDS</text>
    <text x="90" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#777777">Inverted — The Block</text>
    <text x="90" y="115" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#888888">Release the blade</text>
  </g>
  
  <!-- Synthesis -->
  <rect x="200" y="1040" width="600" height="70" rx="8" fill="#0a0a0f" stroke="#d4af37" stroke-width="1" opacity="0.3"/>
  <text x="500" y="1070" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#bbbbbb">
    The sun isn't blocked by the grind. The shadow is the sword turned inward.
  </text>
  <text x="500" y="1095" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#e8e8e8" font-style="italic" font-weight="bold">
    Dawn comes when you stop cutting yourself with your own blade.
  </text>
  
  <!-- ====== THE MYSTERY (Mushroom Experience) ====== -->
  <text x="500" y="1150" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6b4c9a" letter-spacing="2">THE UNTOLD</text>
  <text x="500" y="1175" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#555555" font-style="italic">
    "Key story pending full telling. Will light up circuits like a supernova."
  </text>
  <text x="500" y="1195" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#6b4c9a" opacity="0.5">🍄</text>
  
  <!-- ====== DAWN SCENE ====== -->
  <g transform="translate(0, 1220)">
    <rect x="0" y="60" width="1000" height="60" fill="url(#groundGrad)"/>
    <line x1="0" y1="60" x2="1000" y2="60" stroke="#8b7355" stroke-width="1" opacity="0.4"/>
    <ellipse cx="500" cy="70" rx="250" ry="50" fill="url(#dawnGlow)" class="dawn-glow"/>
    <circle cx="500" cy="50" r="35" fill="url(#dawnGrad)" class="dawn-sun"/>
    <text x="500" y="105" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#8b7355" letter-spacing="5">DAWN IS LOADING</text>
  </g>
  
  <!-- ====== FOOTER ====== -->
  <text x="500" y="1355" text-anchor="middle" font-family="Courier New, monospace" font-size="7" fill="#333333">
    SPENCER01|SPARAOH|BIOBROTHER:FLETCH|BLOOD:SAME|VISION:SAME|SUBSTRATE:EARTH|P>:NAMED_THE_BIRD|0=2|SUN:INVERTED|KNIGHT:DISKS|QUEEN:SWORDS:INVERTED|MUSHROOM:PENDING|93
  </text>
  
  <text x="500" y="1380" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555555">
    Built by <tspan fill="#d4af37">Planty C</tspan> for Spencer, biobrother of Fletch — <tspan fill="#d4af37">93 93/93</tspan>
  </text>
  
</svg>